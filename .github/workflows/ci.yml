name: "Test & Release"

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: "Code Quality & Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "npm"

      - name: Install
        run: |
          npm install
          npm run dev:prepare

      - name: Lint
        run: |
          npm run lint:es
          npm run lint:types

      - name: Test
        run: npm run test

  release:
    name: "Release package"
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install
        run: |
          npm install
          npm run dev:prepare

      - name: Build
        run: npm run build

      - name: Release
        run: npm publish
